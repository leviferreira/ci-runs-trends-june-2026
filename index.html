function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const row = {};
    headers.forEach((h, i) => {
      row[h.trim()] = isNaN(vals[i]) ? vals[i].trim() : parseFloat(vals[i]);
    });
    return row;
  });
}

function fmtSecs(secs) {

  const s = Math.round(secs % 60);
  return `${m}m ${s.toString().padStart(2, '0')}s`;
}

// Linear regression over {x: index, y: value} pairs → returns array of fitted y values
function linreg(values) {
  const n = values.length;
  let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
  for (let i = 0; i < n; i++) {
    sumX += i; sumY += values[i];
    sumXY += i * values[i]; sumX2 += i * i;
  }
  const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;
  return values.map((_, i) => +(intercept + slope * i).toFixed(4));
}

function renderChart(canvasId, rows) {
  const labels = rows.map(r => {
    const d = new Date(r.day + 'T00:00:00Z');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
  });

  const p50mins = rows.map(r => +(r.p50 / 60).toFixed(4));
  const trendVals = linreg(p50mins);

  const datasets = PERCENTILES.map(p => ({
    label: p.label,
    data: rows.map(r => +(r[p.key] / 60).toFixed(4)),
    borderColor: p.color,
    borderWidth: p.width,
    pointRadius: 2,
    pointHoverRadius: 5,
    tension: 0.25,
    fill: false,
    spanGaps: true,
    order: 2,
  }));

  // Trend line for p50
  datasets.push({
    label: 'p50 trend',
    data: trendVals,
    borderColor: '#22d3ee',
    borderWidth: 1.5,
    borderDash: [6, 4],
    pointRadius: 0,
    pointHoverRadius: 0,
    tension: 0,
    fill: false,
    spanGaps: true,
    order: 1,
    segment: {
      borderDash: () => [6, 4],
    },
  });

  new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          ticks: {
            color: '#64748b',
            font: { size: 10 },
            maxTicksLimit: 14,
            maxRotation: 0,
          },
          grid: { color: '#1e2235' },
        },
        y: {
          ticks: {
            color: '#64748b',
            font: { size: 10 },
            callback: v => fmtSecs(v * 60),
          },
          grid: { color: '#1e2235' },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e2235',
          borderColor: '#2d3148',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#cbd5e1',
          padding: 10,
          filter: item => item.dataset.label !== 'p50 trend',
          callbacks: {
            title: items => {
              const idx = items[0].dataIndex;
              return `${rows[idx].day}  (${rows[idx].cnt} builds)`;
            },
            label: ctx => `  ${ctx.dataset.label}: ${fmtSecs(ctx.raw * 60)}`,
          },
        },
      },
    },
  });
}

const panelsEl = document.getElementById('panels');

JOBS.forEach(job => {
  const rows = parseCSV(job.csv);
  const id = job.name.replace(/[^a-z0-9]/g, '-');

  const panel = document.createElement('div');
  panel.className = 'job-panel';
  panel.innerHTML = `
    <div class="job-title">${job.name}</div>
    <div class="job-meta">${rows.length} days · ${rows.reduce((a, r) => a + r.cnt, 0).toLocaleString()} total builds</div>
    <div class="chart-wrap"><canvas id="c-${id}"></canvas></div>
    <div class="legend">
      ${PERCENTILES.map(p => `
        <div class="legend-item">
          <div class="legend-line" style="background:${p.color}"></div>
          ${p.label}
        </div>`).join('')}
      <div class="legend-item">
        <div class="legend-line dashed" style="border-color:#22d3ee"></div>
        p50 trend
      </div>
    </div>
  `;
  panelsEl.appendChild(panel);
  renderChart(`c-${id}`, rows);
});
</script>
